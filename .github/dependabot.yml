version: 2
updates:
  # Service and crawler (Python, uv)
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      python-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Container base image
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
