name: Maintenance task
description: A concrete code change - refactor, cleanup, tech debt, or review follow-up
labels: ["tech-debt"]
body:
  - type: markdown
    attributes:
      value: |
        For work where the change is already understood and someone just needs to
        pick it up. If you are not sure what the fix is, **Bug report** and
        **Feature request** are shorter and easier to fill in.

        Two habits make a task easy to pick up months later:

        - **One issue, one outcome**, so it can be closed in one go. Independent
          changes belong in separate issues, otherwise the issue lingers on its
          slowest item.
        - **Readable without opening the codebase.** Select the lines on GitHub,
          press <kbd>y</kbd> for a permalink, and paste it - the code renders
          inline in the issue.

        Only the summary is required.

        **Found a security vulnerability?** Do not file it here. See the
        [Security Policy](https://github.com/OffCrazyFreak/cijene-api/security/policy).
  - type: textarea
    id: summary
    attributes:
      label: What needs to change
      description: One or two sentences that make sense on their own.
    validations:
      required: true
  - type: dropdown
    id: domain
    attributes:
      label: Domain
      description: Matches the Domain field on the roadmap board.
      options:
        - 🕷 Chain Crawlers
        - 🧹 Data Quality
        - 🏪 Stores & Locations
        - 🏷 Product Data
        - 📉 Prices & Discounts
        - 🔎 Search & Matching
        - 🔌 API & Auth
        - 🗄 Database & Storage
        - 🚀 Platform & Delivery
        - Not sure
    validations:
      required: true
  - type: textarea
    id: where
    attributes:
      label: Where
      description: Paths, or line permalinks so the code shows up inline.
      placeholder: |
        crawler/store/lidl.py
        service/routers/v1.py
    validations:
      required: false
  - type: textarea
    id: behaviour
    attributes:
      label: Current and expected behaviour
      description: What happens today, why it is a problem, and what should be true instead.
      placeholder: |
        Now: each crawler hardcodes its own city list.
        Should be: cities come from enrichment/stores.csv, so adding one is a data change.
    validations:
      required: false
  - type: textarea
    id: done_when
    attributes:
      label: Done when
      description: >-
        How anyone can confirm it worked. A checklist here renders as a progress
        counter on the issue list, so status is visible without opening the issue.
      placeholder: |
        - [ ] A full crawl still produces the same store count
        - [ ] uv run ty check and uv run pytest stay clean
    validations:
      required: false
  - type: textarea
    id: constraints
    attributes:
      label: Constraints and gotchas
      description: >-
        Anything that would send someone down the wrong path: decisions already
        made, code that must not change, related issues or PRs.
    validations:
      required: false
  - type: input
    id: blocked_on
    attributes:
      label: Blocked on
      description: Anything that has to land first, including work outside this repo.
    validations:
      required: false
